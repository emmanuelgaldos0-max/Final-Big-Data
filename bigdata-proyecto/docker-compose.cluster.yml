# docker-compose.cluster.yml
# Kafka + Redis del NODO 1 (Ubuntu, 192.168.1.73) accesibles desde la LAN.
# Diferencia clave vs docker-compose.local.yml: Kafka se ANUNCIA en la IP LAN para que
# el Nodo 2 (Mac, 192.168.1.6) pueda conectar; Redis escucha en todas las interfaces.
#
# Si la IP del Nodo 1 cambia, exportar HOST_LAN_IP antes de levantar:
#   HOST_LAN_IP=192.168.1.73 docker compose -f docker-compose.cluster.yml up -d
services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: bigdata-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      # PLAINTEXT_HOST se anuncia con la IP LAN -> clientes locales y remotos (Mac) usan la misma.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${HOST_LAN_IP:-192.168.1.73}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka-cluster-data:/bitnami/kafka

  redis:
    image: redis:7-alpine
    container_name: bigdata-redis
    ports:
      - "6379:6379"
    # protected-mode no: solo aceptable en LAN de confianza; permite acceso del Nodo 2.
    command: ["redis-server", "--bind", "0.0.0.0", "--protected-mode", "no"]
    volumes:
      - redis-cluster-data:/data

volumes:
  kafka-cluster-data:
  redis-cluster-data:
